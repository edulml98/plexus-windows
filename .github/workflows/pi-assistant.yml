name: Pi Assistant
run-name: "Pi: ${{ github.event.comment.body }}"

on:
  issue_comment:
    types: [created]

jobs:
  pi-agent:
    if: contains(github.event.comment.body, '/pi')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read

    steps:
      - name: Check commenter permission
        id: permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            const level = perm.permission;
            core.info(`Commenter ${context.payload.comment.user.login} has permission: ${level}`);
            if (!['admin', 'write', 'maintain'].includes(level)) {
              core.setFailed(`User ${context.payload.comment.user.login} is not a collaborator or owner — ignoring /pi trigger`);
            }

      - name: Post initial progress comment
        id: initial_comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '🤔 **Pi is working on it...**\n\nAnalyzing your request and planning next steps.',
            });
            core.setOutput('comment_id', comment.id);
            core.info(`Posted progress comment: ${comment.id}`);

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build:frontend

      - name: Run Pi agent
        id: pi
        uses: mcowger/pi-coding-agent-action@suppres_final_comment
        env:
          GH_TOKEN: ${{ secrets.SUPER_TOKEN }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: openrouter
          model: ${{ vars.LLM_MODEL_ID }}
          token: ${{ secrets.LLM_API_KEY }}
          base_url: ${{ secrets.LLM_API_HOST }}
          trigger: /pi
          load_builtin_extensions: false
          suppress_final_comment: true
          export_session_html: true
          prompt: |
            You are a coding assistant for the Plexus repository.

            ## GitHub CLI
            Use `gh` for all GitHub operations. `gh` is pre-installed on the runner — do not
            install it. `GH_TOKEN` is pre-set for authentication — do not run `gh auth login`.
            The full `gh` reference is in `.agents/skills/gh-cli/SKILL.md`.

            ## Progress comment
            A comment has already been posted on issue #${{ github.event.issue.number }} with ID
            `${{ steps.initial_comment.outputs.comment_id }}`. You MUST manage this comment
            throughout your work. Never create new comments — only update this one.

            **Protocol:**
            1. Immediately replace it with a checklist of your plan:
               ```
               gh issue comment ${{ github.event.issue.number }} \
                 --edit-last \
                 --body "## Working on it...
               - [ ] Step 1
               - [ ] Step 2" \
                 --repo ${{ github.repository }}
               ```
            2. Check off each item as you complete it (re-run the same edit command with updated body).
            3. After EVERY tool call, consider whether the TODO list needs updating — update it if progress was made or the plan changed.
            4. When done, replace the entire comment with your final response.

            ## Planning & Efficiency
            - Think ahead about your plan before executing — consider what files you'll need to read and what commands you'll need to run
            - Batch multiple reads and bash calls together where they don't depend on each other's results
            - Minimize round-trips by combining independent operations in a single response

            ## Response style
            - Be concise. Use headings and bullets. No filler text.

            ## When coding is required
            - Create a branch named `bot/issue-${{ github.event.issue.number }}` off `main`
            - Keep changes minimal and focused on the request — do not refactor unrelated code
            - Commit your changes (pre-commit hooks will validate typecheck, format, and tests automatically)
            - Open a PR targeting `main` with a clear title and description referencing the issue
            - NEVER close the issue — leave it open for the user to close after reviewing the PR

      - name: Log agent summary
        if: always()
        env:
          PI_RESPONSE: ${{ steps.pi.outputs.response }}
        run: |
          {
            echo "### Pi Agent Summary"
            echo "- **Success:** ${{ steps.pi.outputs.success }}"
            echo "- **Duration:** ${{ steps.pi.outputs.duration_seconds }}s"
            echo "- **Input tokens:** ${{ steps.pi.outputs.input_tokens }}"
            echo "- **Output tokens:** ${{ steps.pi.outputs.output_tokens }}"
            echo "- **Cost:** \$${{ steps.pi.outputs.cost }}"
            echo ""
            echo "#### Response"
            printf '%s\n' "$PI_RESPONSE"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload session HTML
        if: always() && steps.pi.outputs.session_html_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: pi-session
          path: ${{ steps.pi.outputs.session_html_path }}
          retention-days: 7
