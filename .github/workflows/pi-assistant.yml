name: Pi Assistant
run-name: "Pi: ${{ github.event.comment.body }}"

on:
  issue_comment:
    types: [created]

jobs:
  pi-agent:
    if: contains(github.event.comment.body, '/pi')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read

    steps:
      - name: Check commenter permission
        id: permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            const level = perm.permission;
            core.info(`Commenter ${context.payload.comment.user.login} has permission: ${level}`);
            if (!['admin', 'write', 'maintain'].includes(level)) {
              core.setFailed(`User ${context.payload.comment.user.login} is not a collaborator or owner — ignoring /pi trigger`);
            }

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build:frontend

      - name: Configure custom LLM provider
        run: |
          mkdir -p ~/.pi/agent
          cat > ~/.pi/agent/models.json << 'EOF'
          {
            "providers": {
              "my-llm": {
                "baseUrl": "${{ secrets.LLM_API_HOST }}",
                "apiKey": "${{ secrets.LLM_API_KEY }}",
                "models": [{
                  "id": "${{ vars.LLM_MODEL_ID }}",
                  "api": "openai-chat",
                  "contextWindow": 262000
                }]
              }
            }
          }
          EOF

      - name: Run Pi agent
        id: pi
        uses: shaftoe/pi-coding-agent-action@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: my-llm
          model: ${{ vars.LLM_MODEL_ID }}
          trigger: /pi
          extensions: git:github.com/MonsieurBarti/GH-PI
          load_builtin_extensions: false
          export_session_html: true
          prompt: |
            You are a coding assistant for the Plexus/Shaftoe repository.

            ## Response style
            - Be concise. Use headings and bullets. No filler text.
            - If no code change is needed, answer the question directly as a comment on the issue.

            ## When coding is required
            - Create a branch named `bot/issue-{number}` off `main`
            - Keep changes minimal and focused on the request — do not refactor unrelated code
            - Use GH-PI tools (`tff-github_*`) for all issue and PR operations
            - Commit your changes (pre-commit hooks will validate typecheck, format, and tests automatically)
            - Open a PR targeting `main` with a clear title and a description that references the issue number

      - name: Log agent summary
        if: always()
        run: |
          echo "### Pi Agent Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Success:** ${{ steps.pi.outputs.success }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.pi.outputs.duration_seconds }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Input tokens:** ${{ steps.pi.outputs.input_tokens }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Output tokens:** ${{ steps.pi.outputs.output_tokens }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cost:** \$${{ steps.pi.outputs.cost }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Response" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.pi.outputs.response }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload session HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pi-session
          path: ${{ steps.pi.outputs.session_html_path }}
          retention-days: 7

      - name: Cleanup LLM config
        if: always()
        run: rm -f ~/.pi/agent/models.json
