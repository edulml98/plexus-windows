name: Rewrite Authors

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  rewrite-authors:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rewrite commits with old identity
        env:
          FROM_NAME: ${{ secrets.AUTHOR_REWRITE_FROM_NAME }}
          FROM_EMAIL: ${{ secrets.AUTHOR_REWRITE_FROM_EMAIL }}
          TO_NAME: ${{ secrets.AUTHOR_REWRITE_TO_NAME }}
          TO_EMAIL: ${{ secrets.AUTHOR_REWRITE_TO_EMAIL }}
        run: |
          if [ -z "$FROM_NAME" ] && [ -z "$FROM_EMAIL" ]; then
            echo "No FROM_NAME or FROM_EMAIL configured. Set AUTHOR_REWRITE_FROM_NAME and/or AUTHOR_REWRITE_FROM_EMAIL repository variables."
            exit 1
          fi
          if [ -z "$TO_NAME" ] || [ -z "$TO_EMAIL" ]; then
            echo "TO_NAME and TO_EMAIL are required. Set AUTHOR_REWRITE_TO_NAME and AUTHOR_REWRITE_TO_EMAIL repository variables."
            exit 1
          fi

          git config user.name "$TO_NAME"
          git config user.email "$TO_EMAIL"

          NEEDS_REWRITE=false
          while IFS= read -r commit; do
            author_name=$(git log -1 --format="%an" "$commit")
            author_email=$(git log -1 --format="%ae" "$commit")
            if { [ -n "$FROM_NAME" ] && [ "$author_name" = "$FROM_NAME" ]; } || \
               { [ -n "$FROM_EMAIL" ] && [ "$author_email" = "$FROM_EMAIL" ]; }; then
              NEEDS_REWRITE=true
              break
            fi
          done < <(git rev-list HEAD)

          if [ "$NEEDS_REWRITE" = "false" ]; then
            echo "No commits to rewrite."
            exit 0
          fi

          export _FROM_NAME="$FROM_NAME"
          export _FROM_EMAIL="$FROM_EMAIL"
          export _TO_NAME="$TO_NAME"
          export _TO_EMAIL="$TO_EMAIL"

          git filter-branch -f --env-filter '
            MATCH=false
            [ -n "$_FROM_NAME" ]  && [ "$GIT_AUTHOR_NAME"     = "$_FROM_NAME"  ] && MATCH=true
            [ -n "$_FROM_EMAIL" ] && [ "$GIT_AUTHOR_EMAIL"    = "$_FROM_EMAIL" ] && MATCH=true
            if [ "$MATCH" = "true" ]; then
              export GIT_AUTHOR_NAME="$_TO_NAME"
              export GIT_AUTHOR_EMAIL="$_TO_EMAIL"
            fi

            MATCH=false
            [ -n "$_FROM_NAME" ]  && [ "$GIT_COMMITTER_NAME"  = "$_FROM_NAME"  ] && MATCH=true
            [ -n "$_FROM_EMAIL" ] && [ "$GIT_COMMITTER_EMAIL" = "$_FROM_EMAIL" ] && MATCH=true
            if [ "$MATCH" = "true" ]; then
              export GIT_COMMITTER_NAME="$_TO_NAME"
              export GIT_COMMITTER_EMAIL="$_TO_EMAIL"
            fi
          ' -- --all

      - name: Force push rewritten history
        run: |
          git push --force origin main

